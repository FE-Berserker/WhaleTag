<?xml version="1.0" encoding="UTF-8"?>
<!-- Edge case: viewBox but NO width/height. Tests sharp's default density. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#222831"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#00adb5" stroke-width="8"/>
  <circle cx="100" cy="100" r="40" fill="#eeeeee"/>
  <rect x="90" y="90" width="20" height="20" fill="#222831"/>
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="11" fill="#00adb5">viewBox only · no width/height</text>
</svg>
