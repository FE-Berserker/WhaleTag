<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' whale-extension://*; style-src 'self' 'unsafe-inline' whale-extension://*; img-src 'self' data: blob: whale-extension://*; media-src 'self' blob: whale-file://* whale-audio://*; connect-src 'self' whale-extension:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Player</title>
    <script src="./extension-api.js"></script>
  </head>
  <body>
    <div id="root">
      <div id="toolbar" role="toolbar" aria-label="Player controls">
        <button
          id="btn-prev"
          type="button"
          class="tb-btn"
          aria-label="Previous track"
          data-i18n-title="prevTitle"
          disabled
        >
          &#8249;
        </button>
        <span id="counter" class="tb-counter" aria-live="polite">—</span>
        <button
          id="btn-next"
          type="button"
          class="tb-btn"
          aria-label="Next track"
          data-i18n-title="nextTitle"
          disabled
        >
          &#8250;
        </button>
        <button
          id="btn-seek-back"
          type="button"
          class="tb-btn"
          aria-label="Rewind 10 seconds (J)"
          data-i18n-title="seekBackTitle"
        >
          &#9198;
        </button>
        <button
          id="btn-seek-forward"
          type="button"
          class="tb-btn"
          aria-label="Fast forward 10 seconds (L)"
          data-i18n-title="seekForwardTitle"
        >
          &#9197;
        </button>
        <span class="tb-sep" aria-hidden="true"></span>
        <button
          id="btn-loop"
          type="button"
          class="tb-btn tb-mode"
          data-i18n-title="loopListTitle"
          aria-label="Loop mode: list"
        >
          &#8635;
          <span id="loop-label" class="tb-mode-label">list</span>
        </button>
        <div class="tb-dropdown" id="speed-dropdown">
          <button
            id="btn-speed"
            type="button"
            class="tb-btn"
            aria-label="Playback speed: 1x"
            aria-haspopup="menu"
            aria-expanded="false"
            data-i18n-title="speedTitle"
          >
            <span id="speed-label">1x</span>
            <span class="tb-caret" aria-hidden="true">&#9662;</span>
          </button>
          <ul
            id="speed-menu"
            class="tb-menu"
            role="menu"
            aria-label="Playback speed"
            hidden
          ></ul>
        </div>
        <button
          id="btn-shuffle"
          type="button"
          class="tb-btn"
          aria-label="Shuffle: off"
          data-i18n-title="shuffleOffTitle"
          aria-pressed="false"
        >
          &#8646;
        </button>
        <button
          id="btn-playlist"
          type="button"
          class="tb-btn"
          aria-label="Toggle playlist"
          data-i18n-title="playlistTitle"
          aria-pressed="false"
        >
          &#9776;
        </button>
      </div>

      <div id="stage">
        <div id="status" role="status" aria-live="polite"></div>
        <div id="container"></div>
      </div>

      <!-- Bar-mode dock (only visible when ?mode=bar). Compact single-row UI;
           renders inline with the same <audio> element as fullscreen. -->
      <div id="bar" hidden role="toolbar" aria-label="Background music">
        <div class="bar-cover" aria-hidden="true"></div>
        <div class="bar-meta">
          <div class="bar-title" title="">未在播放</div>
          <div class="bar-sub">
            <span class="bar-time-cur">0:00</span>
            <span class="bar-time-sep"> / </span>
            <span class="bar-time-tot">0:00</span>
          </div>
        </div>
        <button id="bar-prev" type="button" class="bar-btn" aria-label="上一首">&#9198;</button>
        <button id="bar-play" type="button" class="bar-btn bar-btn-play" aria-label="播放/暂停">&#9654;</button>
        <button id="bar-next" type="button" class="bar-btn" aria-label="下一首">&#9197;</button>
        <button
          id="bar-loop"
          type="button"
          class="bar-btn"
          aria-label="循环模式:列表"
          aria-pressed="false"
          title="循环:列表(自动连播)"
        >
          &#8635;
        </button>
        <button
          id="bar-shuffle"
          type="button"
          class="bar-btn"
          aria-label="随机播放:关闭"
          aria-pressed="false"
          title="随机播放:关闭"
        >
          &#8646;
        </button>
        <div class="bar-progress" role="slider" aria-label="进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
          <div class="bar-progress-fill"></div>
        </div>
        <button id="bar-mute" type="button" class="bar-btn" aria-label="静音" aria-pressed="false">&#128263;</button>
        <button id="bar-max" type="button" class="bar-btn" aria-label="放大到完整播放器" title="放大">&#10530;</button>
      </div>

      <div id="playlist" hidden aria-label="Playlist">
        <div id="playlist-header" data-i18n-text="playlistHeader">Playlist</div>
        <ul id="playlist-list" role="listbox" aria-label="Tracks"></ul>
      </div>
    </div>
  </body>
</html>
