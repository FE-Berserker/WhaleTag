<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' whale-extension://*; style-src 'self' 'unsafe-inline' whale-extension://*; img-src 'self' data: blob: https: http: whale-extension://* whale-file://*; connect-src 'self' whale-extension: whale-file:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Editor</title>
    <!--
      §18.3.3 — KaTeX CSS for math rendering. KaTeX's output uses
      classes (`.katex`, `.katex-mathml`, etc.) — the styling is
      class-only, so a single `<link rel="stylesheet">` is enough.
      The file is copied to dist by scripts/build-extensions.js
      alongside katex.min.js. KaTeX's render output is produced in
      the katex-sandbox iframe and copied back to this main iframe;
      once here, it picks up the same styles automatically.
    -->
    <link rel="stylesheet" href="./katex.min.css" />
    <script src="./extension-api.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button id="btn-find" title="Find / Replace (Ctrl+F)">⌕ Find</button>
        <span class="toolbar-separator"></span>
        <button id="btn-toggle-wrap" title="Toggle Word Wrap">↩ Wrap</button>
        <span class="toolbar-separator"></span>
        <button id="btn-zoom-out" title="Zoom Out (Ctrl+-)">A−</button>
        <button id="btn-zoom-reset" title="Actual Size (Ctrl+0)">A</button>
        <button id="btn-zoom-in" title="Zoom In (Ctrl++)">A+</button>
        <span class="toolbar-separator"></span>
        <button id="btn-toggle-toc" title="Toggle Outline / TOC (Ctrl+Shift+O)">≡ TOC</button>
        <span class="toolbar-separator"></span>
        <button id="btn-goto-line" title="Go to Line (Ctrl+G)">↦ Line</button>
        <span class="toolbar-separator"></span>
        <button id="btn-export-html" title="Export Preview as HTML">⇩ HTML</button>
        <button id="btn-export-pdf" title="Export Preview as PDF">⇩ PDF</button>
        <span class="toolbar-separator toolbar-spacer"></span>
        <span id="wrap-state" class="toolbar-state">No Wrap</span>
      </div>
      <div id="main-row">
        <div id="editor-pane"></div>
        <div id="splitter"></div>
        <div id="preview-pane"></div>
        <aside id="toc-sidebar" hidden>
          <div class="toc-header">Outline</div>
          <div id="toc-list"></div>
        </aside>
      </div>
      <div id="status">
        <span class="status-left">
          <span class="status-item">
            <span class="status-label">Ln</span>
            <span id="status-ln">1</span>
            <span class="status-sep">,</span>
            <span class="status-label">Col</span>
            <span id="status-col">1</span>
          </span>
          <span class="status-item">
            <span class="status-label">Length</span>
            <span id="status-length">0</span>
          </span>
          <span class="status-item">
            <span class="status-label">Sel</span>
            <span id="status-sel">0</span>
          </span>
          <span class="status-item">
            <span class="status-label">Words</span>
            <span id="status-words">0</span>
          </span>
        </span>
        <span class="status-right">
          <span class="status-item" id="status-dirty" hidden title="Document has unsaved changes">● Modified</span>
          <span class="status-item" id="status-readonly" hidden>Read Only</span>
          <span class="status-item" id="status-undo" hidden title="Undo (Ctrl+Z)">↶ Undo</span>
          <span class="status-item" id="status-redo" hidden title="Redo (Ctrl+Shift+Z)">↷ Redo</span>
          <span class="status-item">
            <span class="status-label">UTF-8</span>
          </span>
        </span>
      </div>
    </div>
  </body>
</html>
